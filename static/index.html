<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选股策略回测</title>
<style>
  :root { --up:#d32f2f; --down:#388e3c; --border:#e0e0e0; --head:#1565c0; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
         margin: 0; background: #f5f6f8; color: #222; }
  header { background: var(--head); color: #fff; padding: 16px 24px; }
  header h1 { margin: 0; font-size: 20px; }
  .wrap { padding: 20px 24px; }
  .panel { background: #fff; border: 1px solid var(--border); border-radius: 8px;
           padding: 16px 20px; margin-bottom: 18px; }
  .row { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  input[type=date] { padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
  textarea { width: 100%; min-height: 90px; padding: 10px; border: 1px solid #ccc;
             border-radius: 6px; font-size: 13px; line-height: 1.5; resize: vertical; }
  .template-cols { display: flex; gap: 12px; margin-top: 10px; }
  .template-col { flex: 1; min-width: 0; }
  .template-col-hd { font-size: 12px; font-weight: 600; padding: 4px 10px;
                     border-radius: 4px 4px 0 0; margin-bottom: -1px; }
  .template-col-hd.wencai { background: #e8f0fe; color: #1a56db; border: 1px solid #c5d8fb; }
  .template-col-hd.local  { background: #e6f4ea; color: #1e7e34; border: 1px solid #b7dfbe; }
  .template-col textarea.wencai { border-top-left-radius: 0; border-color: #c5d8fb; }
  .local-checks { border: 1px solid #b7dfbe; border-radius: 0 6px 6px 6px;
                  padding: 8px 12px; background: #fff; }
  .lc-row { display: flex; align-items: center; gap: 10px; padding: 5px 0;
            border-bottom: 1px solid #f0f0f0; }
  .lc-row:last-child { border-bottom: none; }
  .lc-toggle { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
  .lc-label { flex: 1; font-size: 13px; color: #333; }
  .lc-label.disabled { color: #aaa; text-decoration: line-through; }
  .lc-param { display: flex; align-items: center; gap: 4px; }
  .lc-param label { font-size: 12px; color: #666; white-space: nowrap; }
  .lc-param input[type=number] { width: 64px; padding: 3px 6px; border: 1px solid #ccc;
                                  border-radius: 4px; font-size: 13px; }
  .lc-param select { padding: 3px 6px; font-size: 13px; min-width: auto; }
  button { background: var(--head); color: #fff; border: none; padding: 9px 22px;
           border-radius: 6px; font-size: 14px; cursor: pointer; }
  button:disabled { background: #9bb8d6; cursor: not-allowed; }
  select { padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px;
           font-size: 14px; background: #fff; min-width: 200px; }
  .strat-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
               margin-bottom: 8px; }
  .strat-bar label { margin: 0; }
  .btn-sm { padding: 7px 12px; font-size: 13px; }
  .btn-ghost { background: #fff; color: var(--head); border: 1px solid var(--head); }
  .btn-danger { background: #fff; color: var(--up); border: 1px solid var(--up); }
  .hint { font-size: 12px; color: #999; margin: 4px 0 0; }
  details { margin-top: 12px; }
  summary { cursor: pointer; color: var(--head); font-size: 13px; }
  #status { margin: 10px 0; font-size: 14px; color: #555; min-height: 20px; }
  .progress { margin: 12px 0; display: none; }
  .progress .lbl { font-size: 13px; color: #555; margin-bottom: 5px; }
  .bar { height: 12px; background: #e6eaf0; border-radius: 6px; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0; background: var(--head);
             border-radius: 6px; transition: width .25s ease; }
  .api-status { margin-top: 8px; font-size: 13px; color: #555;
                display: flex; align-items: center; gap: 7px; }
  .api-status .dot { width: 9px; height: 9px; border-radius: 50%; background: #bbb;
                     flex: 0 0 auto; }
  .api-status.idle    .dot { background: #bbb; }
  .api-status.loading .dot { background: #f9a825; animation: pulse 1s ease-in-out infinite; }
  .api-status.ok      .dot { background: #2e7d32; }
  .api-status.err     .dot { background: #d32f2f; }
  .api-status.err     { color: #d32f2f; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  table { width: 100%; border-collapse: collapse; background: #fff; font-size: 14px; }
  th, td { border: 1px solid var(--border); padding: 8px 10px; text-align: center; }
  th { background: #f0f3f7; font-weight: 600; position: sticky; top: 0; }
  td.date { font-weight: 600; background: #fafbfc; white-space: nowrap; }
  td.stock { text-align: left; white-space: nowrap; }
  .code { color: #888; font-size: 12px; }
  .badge-lift { display: inline-block; margin-left: 5px; padding: 0 5px; border-radius: 4px;
                background: #d32f2f; color: #fff; font-size: 12px; font-weight: 600;
                cursor: help; vertical-align: middle; }
  .up { color: var(--up); font-weight: 600; }
  .down { color: var(--down); font-weight: 600; }
  .flat { color: #666; }
  .na { color: #bbb; }
  .empty { color: #999; font-style: italic; }
  .sub { color: #999; font-size: 11px; }
  tr.notice-row td { background: #fff8e1; color: #8a6d00; text-align: left;
                     padding: 6px 12px; font-size: 13px; }
  tr.debug-row td { background: #fafafa; text-align: left; padding: 6px 12px; }
  tr.debug-row summary { color: #777; font-size: 12px; }
  .dbg-cols { display: flex; gap: 12px; }
  .dbg-col { flex: 1; min-width: 0; }
  .dbg-col-hd { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px;
                padding: 3px 8px; border-radius: 4px; }
  .dbg-col-hd.wencai { background: #e8f0fe; color: #1a56db; }
  .dbg-col-hd.local  { background: #e6f4ea; color: #1e7e34; }
  .dbg { margin: 6px 0; }
  .dbg b { color: #555; font-size: 12px; }
  .dbg pre { margin: 4px 0 0; padding: 10px; background: #1e1e1e; color: #d4d4d4;
             border-radius: 6px; font-size: 12px; line-height: 1.5;
             max-height: 320px; overflow: auto; white-space: pre-wrap; word-break: break-all; }
  .dbg-q pre { background: #f0f3f7; color: #233; }
</style>
</head>
<body>
<header><h1>📈 选股策略回测系统</h1></header>
<div class="wrap">
  <div class="panel">
    <div class="row">
      <div>
        <label>开始日期</label>
        <input type="date" id="start" value="2026-05-25">
      </div>
      <div>
        <label>结束日期</label>
        <input type="date" id="end" value="2026-05-27">
      </div>
      <div>
        <button id="run" onclick="runBacktest()">开始回测</button>
      </div>
    </div>
    <div class="strat-bar" style="margin-top:14px;">
      <label>选股策略</label>
      <select id="strat-select" onchange="onSelectStrategy()"></select>
      <button class="btn-sm btn-ghost" onclick="newStrategy()" title="新增策略">＋ 新增</button>
      <button class="btn-sm" onclick="saveStrategy()" title="保存当前文本框内容">💾 保存</button>
      <button class="btn-sm btn-danger" onclick="deleteStrategy()" title="删除当前策略">🗑 删除</button>
    </div>
    <div class="template-cols">
      <div class="template-col">
        <div class="template-col-hd wencai">📡 发送给问财的条件</div>
        <textarea id="wencai-clauses" class="wencai" spellcheck="false"></textarea>
      </div>
      <div class="template-col">
        <div class="template-col-hd local">🖥 本地核验条件（9:26 开盘价）</div>
        <div class="local-checks" id="local-checks-form"></div>
      </div>
    </div>
    <p class="hint">占位符：{T} 选股日，{T1}/{T2}/{T3} 为往前推的第 1/2/3 个交易日。勾选启用本地指标并填写参数值。</p>
  </div>

  <div id="progress" class="progress">
    <div class="lbl"><span id="prog-text">准备中…</span></div>
    <div class="bar"><i id="prog-fill"></i></div>
    <div id="api-status" class="api-status"><span class="dot"></span><span id="api-text">问财接口：空闲</span></div>
  </div>
  <div id="status"></div>
  <div id="result"></div>
</div>

<script>
// ---- 本地指标表单 ----
let INDICATORS = [];   // 从 /api/local-indicators 加载的指标定义
let STRATEGIES = {};
let DEFAULT_NAME = '默认策略';

async function loadIndicators() {
  const r = await fetch('/api/local-indicators');
  const j = await r.json();
  INDICATORS = j.indicators || [];
}

// 将指标定义 + 当前启用配置渲染为表单行
function renderLocalChecks(checks) {
  // checks: [{type, ...params}] 或 []，null 表示用默认值
  const activeMap = {};
  (checks || []).forEach(c => { activeMap[c.type] = c; });

  const form = document.getElementById('local-checks-form');
  form.innerHTML = '';
  INDICATORS.forEach(ind => {
    const active = activeMap[ind.type];
    const enabled = !!active;
    const row = document.createElement('div');
    row.className = 'lc-row';
    row.dataset.type = ind.type;

    // 启用复选框
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'lc-toggle'; cb.checked = enabled;
    cb.addEventListener('change', () => {
      row.querySelectorAll('.lc-param input, .lc-param select').forEach(el => {
        el.disabled = !cb.checked;
      });
      row.querySelector('.lc-label').classList.toggle('disabled', !cb.checked);
    });

    // 描述文字（只读）
    const lbl = document.createElement('span');
    lbl.className = 'lc-label' + (enabled ? '' : ' disabled');
    lbl.textContent = ind.label;

    row.appendChild(cb);
    row.appendChild(lbl);

    // 参数输入
    ind.params.forEach(p => {
      const wrap = document.createElement('div');
      wrap.className = 'lc-param';
      const plbl = document.createElement('label');
      plbl.textContent = p.label + '：';
      let el;
      if (p.type === 'select') {
        el = document.createElement('select');
        p.options.forEach(opt => {
          const o = document.createElement('option');
          o.value = opt; o.textContent = opt; el.appendChild(o);
        });
        el.value = active ? active[p.name] : p.default;
      } else {
        el = document.createElement('input');
        el.type = 'number'; el.step = 'any';
        el.value = active ? active[p.name] : p.default;
      }
      el.dataset.param = p.name;
      el.disabled = !enabled;
      wrap.appendChild(plbl); wrap.appendChild(el);
      row.appendChild(wrap);
    });

    form.appendChild(row);
  });
}

// 从表单读出结构化 local_checks 列表
function readLocalChecks() {
  const checks = [];
  document.querySelectorAll('#local-checks-form .lc-row').forEach(row => {
    const cb = row.querySelector('.lc-toggle');
    if (!cb.checked) return;
    const item = {type: row.dataset.type};
    row.querySelectorAll('[data-param]').forEach(el => {
      const v = el.tagName === 'SELECT' ? el.value : parseFloat(el.value);
      item[el.dataset.param] = v;
    });
    checks.push(item);
  });
  return checks;
}

function fillForm(s) {
  document.getElementById('wencai-clauses').value = s ? (s.wencai_clauses || '') : '';
  renderLocalChecks(s ? (s.local_checks || []) : null);
}

async function loadStrategies(selectName) {
  try {
    const r = await fetch('/api/strategies');
    const j = await r.json();
    DEFAULT_NAME = j.default_name || DEFAULT_NAME;
    STRATEGIES = {};
    const sel = document.getElementById('strat-select');
    sel.innerHTML = '';
    (j.strategies || []).forEach(s => {
      STRATEGIES[s.name] = s;
      const opt = document.createElement('option');
      opt.value = s.name; opt.textContent = s.name;
      sel.appendChild(opt);
    });
    const names = Object.keys(STRATEGIES);
    const pick = selectName && STRATEGIES[selectName] ? selectName : names[0];
    if (pick) { sel.value = pick; fillForm(STRATEGIES[pick]); }
  } catch (e) { /* 退化：仍可手动编辑文本框 */ }
}

function onSelectStrategy() {
  const name = document.getElementById('strat-select').value;
  if (STRATEGIES[name]) fillForm(STRATEGIES[name]);
}

async function postStrategy(name, wencai_clauses, local_checks) {
  const r = await fetch('/api/strategies', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name, wencai_clauses, local_checks}),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({detail: r.statusText}));
    throw new Error(err.detail || '保存失败');
  }
}

async function saveStrategy() {
  const sel = document.getElementById('strat-select');
  const cur = sel.value || '';
  const name = (prompt('保存为策略名称：', cur) || '').trim();
  if (!name) return;
  if (STRATEGIES[name] != null && name !== cur &&
      !confirm(`策略「${name}」已存在，覆盖它？`)) return;
  try {
    await postStrategy(name,
      document.getElementById('wencai-clauses').value,
      readLocalChecks());
    await loadStrategies(name);
  } catch (e) { alert(e.message); }
}

async function newStrategy() {
  const name = (prompt('新策略名称（内容取当前表单，可保存后再编辑）：', '') || '').trim();
  if (!name) return;
  if (STRATEGIES[name] != null) { alert(`策略「${name}」已存在`); return; }
  try {
    await postStrategy(name,
      document.getElementById('wencai-clauses').value,
      readLocalChecks());
    await loadStrategies(name);
  } catch (e) { alert(e.message); }
}

async function deleteStrategy() {
  const name = document.getElementById('strat-select').value;
  if (!name) return;
  if (name === DEFAULT_NAME) { alert('默认策略不可删除'); return; }
  if (!confirm(`删除策略「${name}」？`)) return;
  try {
    const r = await fetch('/api/strategies/' + encodeURIComponent(name), {method: 'DELETE'});
    if (!r.ok) {
      const err = await r.json().catch(() => ({detail: r.statusText}));
      throw new Error(err.detail || '删除失败');
    }
    await loadStrategies();
  } catch (e) { alert(e.message); }
}

loadIndicators().then(() => loadStrategies());

function esc(s) {
  return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

function debugRow(day) {
  const n = Array.isArray(day.raw_response) ? day.raw_response.length : 0;
  const q = day.query ? esc(day.query) : '（无）';
  let raw;
  try { raw = esc(JSON.stringify(day.raw_response, null, 2)); }
  catch (e) { raw = esc(String(day.raw_response)); }

  // 本地计算数据：从每只股票提取 angle_t / angle_t2 / lift / base_price
  const stocks = day.stocks || [];
  const localData = stocks.map(s => ({
    code: s.code, name: s.name,
    angle_t: s.angle_t, angle_t2: s.angle_t2,
    lift: s.lift,
    base_price: s.base_price,
    close_t: s.close_t,
    prev_close: s.prev_close,
  }));
  let localJson;
  try { localJson = esc(JSON.stringify(localData, null, 2)); }
  catch (e) { localJson = '{}'; }

  return `<tr class="debug-row"><td colspan="10">`
    + `<details><summary>🔍 ${day.date} · 问财数据（${n} 条）& 本地计算（${stocks.length} 只）</summary>`
    + `<div class="dbg-cols">`
    + `<div class="dbg-col">`
    + `<div class="dbg-col-hd wencai">📡 发送给问财</div>`
    + `<div class="dbg dbg-q"><b>请求语句：</b><pre>${q}</pre></div>`
    + `<div class="dbg"><b>原始返回（${n} 条）：</b><pre>${raw}</pre></div>`
    + `</div>`
    + `<div class="dbg-col">`
    + `<div class="dbg-col-hd local">🖥 本地计算结果</div>`
    + `<div class="dbg"><b>均线角度 / 拉升资金 / 价格（${stocks.length} 只）：</b><pre>${localJson}</pre></div>`
    + `</div>`
    + `</div>`
    + `</details></td></tr>`;
}

function cell(fwd) {
  if (!fwd || fwd.price == null || fwd.pct == null) {
    const d = fwd && fwd.date ? `<div class="sub">${fwd.date}</div>` : '';
    return `<span class="na">—</span>${d}`;
  }
  const cls = fwd.pct > 0 ? 'up' : (fwd.pct < 0 ? 'down' : 'flat');
  const sign = fwd.pct > 0 ? '+' : '';
  return `<span class="${cls}">${fwd.price.toFixed(2)} / ${sign}${fwd.pct.toFixed(2)}%</span>`
       + `<div class="sub">${fwd.date}</div>`;
}

// 价格 + 相对 base 的涨跌幅（同配色）。选股日收盘价用：开盘→收盘的波动。
function pricePct(price, base) {
  if (price == null) return '<span class="na">—</span>';
  if (base == null || base === 0) return price.toFixed(2);
  const pct = (price / base - 1) * 100;
  const cls = pct > 0 ? 'up' : (pct < 0 ? 'down' : 'flat');
  const sign = pct > 0 ? '+' : '';
  return `<span class="${cls}">${price.toFixed(2)} / ${sign}${pct.toFixed(2)}%</span>`;
}

// 仅涨跌幅（同配色）。竞价涨幅 =（开盘价/前一日收盘价 - 1），开盘价即竞价价。
function pctOnly(price, base) {
  if (price == null || base == null || base === 0) return '<span class="na">—</span>';
  const pct = (price / base - 1) * 100;
  const cls = pct > 0 ? 'up' : (pct < 0 ? 'down' : 'flat');
  const sign = pct > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${pct.toFixed(2)}%</span>`;
}

function price2(v) {
  return v != null ? v.toFixed(2) : '<span class="na">—</span>';
}

function noticeRow(day) {
  if (!day.notice) return '';
  return `<tr class="notice-row"><td colspan="10">⚠️ ${esc(day.notice)}</td></tr>`;
}

function dayRows(day) {
  const stocks = day.stocks || [];
  let html = noticeRow(day);
  if (!stocks.length) {
    const msg = day.error ? `<span class="empty">${day.error}</span>` : '<span class="empty">无选股</span>';
    html += `<tr><td class="date">${day.date}</td><td colspan="9">${msg}</td></tr>`;
    return html + debugRow(day);
  }
  stocks.forEach((s, i) => {
    html += '<tr>';
    if (i === 0) html += `<td class="date" rowspan="${stocks.length}">${day.date}<div class="sub">${stocks.length} 只</div></td>`;
    const lift = s.lift ? ' <span class="badge-lift" title="连续3天拉升资金增加">主</span>' : '';
    html += `<td class="stock">${s.name}${lift} <span class="code">${s.code}</span></td>`;
    html += `<td>${s.angle_t != null ? s.angle_t.toFixed(2) + '°' : '<span class="na">—</span>'}${s.angle_t2 != null ? `<div class="sub">T2 ${s.angle_t2.toFixed(2)}°</div>` : ''}</td>`;
    html += `<td>${price2(s.prev_close)}</td>`;
    html += `<td>${price2(s.base_price)}</td>`;
    html += `<td>${pctOnly(s.base_price, s.prev_close)}</td>`;
    html += `<td>${pricePct(s.close_t, s.base_price)}</td>`;
    html += `<td>${cell(s.forwards[0])}</td>`;
    html += `<td>${cell(s.forwards[1])}</td>`;
    html += `<td>${cell(s.forwards[2])}</td>`;
    html += '</tr>';
  });
  return html + debugRow(day);
}

const TABLE_HEAD = '<table><thead><tr>'
  + '<th>日期</th><th>当日选股</th><th>T均线角度(9:26)</th><th>前一日收盘价</th><th>选股日开盘价</th><th>竞价涨幅</th><th>选股日收盘价</th>'
  + '<th>后1个交易日</th><th>后2个交易日</th><th>后3个交易日</th>'
  + '</tr></thead><tbody id="tbody"></tbody></table>';

function setProgress(done, total, label) {
  const box = document.getElementById('progress');
  const fill = document.getElementById('prog-fill');
  const text = document.getElementById('prog-text');
  box.style.display = 'block';
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  fill.style.width = pct + '%';
  text.textContent = `${label} ${done}/${total}（${pct}%）`;
}

// 问财接口请求状态指示灯。state: idle | loading | ok | err
function setApiStatus(state, text) {
  const box = document.getElementById('api-status');
  box.className = 'api-status ' + state;
  document.getElementById('api-text').textContent = '问财接口：' + text;
}

async function runBacktest() {
  const btn = document.getElementById('run');
  const status = document.getElementById('status');
  const result = document.getElementById('result');
  const body = {
    start_date: document.getElementById('start').value,
    end_date: document.getElementById('end').value,
    wencai_clauses: document.getElementById('wencai-clauses').value,
    local_checks: readLocalChecks(),
  };
  btn.disabled = true;
  status.textContent = '';
  result.innerHTML = '';
  setProgress(0, 0, '准备中…');
  setApiStatus('loading', '连接中…');

  let total = 0, done = 0, stockCount = 0, tbody = null;
  try {
    const r = await fetch('/api/backtest/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({detail: r.statusText}));
      throw new Error(err.detail || '请求失败');
    }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const {value, done: streamDone} = await reader.read();
      if (streamDone) break;
      buf += decoder.decode(value, {stream: true});
      let nl;
      while ((nl = buf.indexOf('\n')) >= 0) {
        const line = buf.slice(0, nl).trim();
        buf = buf.slice(nl + 1);
        if (!line) continue;
        const ev = JSON.parse(line);
        if (ev.type === 'start') {
          total = ev.total;
          result.innerHTML = total ? TABLE_HEAD : '<div class="panel empty">区间内无交易日</div>';
          tbody = document.getElementById('tbody');
          setProgress(0, total, '回测进度');
          if (!total) setApiStatus('idle', '空闲');
        } else if (ev.type === 'querying') {
          setApiStatus('loading', `请求中 · 第 ${ev.index}/${ev.total} 天（${ev.date}）…`);
        } else if (ev.type === 'queried') {
          if (ev.error) {
            setApiStatus('err', `第 ${ev.index}/${ev.total} 天（${ev.date}）失败：${ev.error}`);
          } else {
            setApiStatus('ok', `第 ${ev.index}/${ev.total} 天（${ev.date}）返回 ${ev.hits} 条，本地核验 ${ev.processing} 只…`);
          }
        } else if (ev.type === 'day') {
          done = ev.index;
          const day = ev.row;
          stockCount += (day.stocks ? day.stocks.length : 0);
          if (tbody) tbody.insertAdjacentHTML('beforeend', dayRows(day));
          setProgress(done, total, `回测进度 · 最新 ${day.date}`);
          status.textContent = `已完成 ${done} 个交易日，累计选股 ${stockCount} 只…`;
        } else if (ev.type === 'error') {
          throw new Error(ev.message || '回测失败');
        } else if (ev.type === 'done') {
          setProgress(ev.total, ev.total, '回测完成');
          if (ev.total) setApiStatus('ok', `完成 · 共 ${ev.total} 个交易日`);
        }
      }
    }
    status.textContent = `完成：共 ${total} 个交易日，累计选股 ${stockCount} 只。`;
  } catch (e) {
    status.innerHTML = `<span style="color:var(--up)">出错：${e.message}</span>`;
    setApiStatus('err', e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
